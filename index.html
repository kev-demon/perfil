<!DOCTYPE html>
<html>
<head>
<title>Mi perfil</title>

<style>
  body {
    font-family: Courier;
    background-color: #fafafa;
    margin: 0;
  }

  .perfil {
    text-align: center;
    padding: 20px;
  }

  .perfil img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
  }

  .nombre {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
  }

  .descripcion {
    color: gray;
    margin: 10px;
  }

  .boton {
    background-color: #0095f6;
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
  }

  .seguidores {
    margin: 10px;
    font-weight: bold;
  }

  .galeria {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    padding: 10px;
  }

  .galeria img {
    width: 100%;
    height: 100px;
    object-fit: contain;
  }

</style>
</head>

<body>

<div id="modal" style="display:none;">
  <img id="imgGrande" style="width:80%; margin:auto; display:block;">
</div>

<div class="perfil">
  <img src="imagen19.jpg""https://via.placeholder.com/100">
  <div class="nombre">Kevin</div>
  <div class="descripcion">Amante de las motos</div>
  <button class="boton">Seguir</button>
</div>

<div class="seguidores">700k seguidores</div>

<div class="galeria">
  <img src="imagen1.jpg">
  <img src="imagen2.jpg">
  <img src="imagen3.jpg">
  <img src="imagen4.jpg">
  <img src="imagen5.jpg">
  <img src="imagen2.jpg">
</div>

</body>
</html>
